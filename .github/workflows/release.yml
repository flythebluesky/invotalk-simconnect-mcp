name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o invotalk-simconnect-mcp.exe ./cmd/server/

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.ref_name }} installer\setup.iss

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            invotalk-simconnect-mcp.exe
            LICENSE
            THIRD-PARTY-LICENSES
            installer/Output/invotalk-simconnect-mcp-setup.exe
          generate_release_notes: true
