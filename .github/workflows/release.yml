name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o invotalk-simconnect-mcp.exe ./cmd/server/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: invotalk-simconnect-mcp.exe
          generate_release_notes: true
